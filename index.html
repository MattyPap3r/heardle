<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heardle</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-color: #16161c;
            --text-color: #f5f5f7;
            --accent-color: #ff5e7e; /* Rosa estivo */
            --border-color: #262630;
            --success-color: #1db954;
            --error-color: #e53935;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        header {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #ff5e7e, #ff9f43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .settings-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        /* Lista tentativi */
        .attempts-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .attempt-box {
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            font-size: 14px;
            background-color: var(--card-color);
            transition: all 0.2s ease;
        }

        .attempt-box.empty {
            border-style: dashed;
            opacity: 0.5;
        }

        .attempt-box.incorrect {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
        }

        .attempt-box.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .attempt-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            width: 18px;
            height: 18px;
        }

        .attempt-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Controlli Player */
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            background: var(--card-color);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #2c2c35;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #ff9f43);
            transition: width 0.1s linear;
        }

        .time-marker {
            position: absolute;
            top: 0;
            height: 100%;
            width: 2px;
            background-color: var(--card-color);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent-color), #ff9f43);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            box-shadow: 0 4px 15px rgba(255, 94, 126, 0.3);
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .time-info {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
        }

        /* Input di gioco & Autocomplete */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
            margin-bottom: 20px;
            position: relative;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: var(--card-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        /* Menu suggerimenti */
        .suggestions {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            margin-bottom: 5px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            display: none;
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:active {
            background-color: #22222e;
        }

        .buttons-row {
            display: flex;
            gap: 10px;
        }

        button.action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        button.action-btn:active {
            opacity: 0.8;
        }

        .skip-btn {
            background-color: #2c2c35;
            color: white;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--accent-color), #ff9f43);
            color: white;
        }

        /* Iframe YouTube Nascosto */
        #yt-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        /* Modali / Dialoghi */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 200;
        }

        .modal-content {
            background-color: var(--card-color);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .modal h2 {
            margin-bottom: 12px;
            font-size: 24px;
        }

        .modal p {
            margin-bottom: 16px;
            color: #a1a1aa;
            font-size: 15px;
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--accent-color), #ff9f43);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        /* Status Loader */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 15, 18, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 94, 126, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        </button>
    </header>

    <!-- Schermata caricamento -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-status">Inizializzazione gioco...</p>
    </div>

    <div class="game-container">
        <!-- I 6 tentativi -->
        <div class="attempts-container" id="attempts">
            <div class="attempt-box empty" id="attempt-0"></div>
            <div class="attempt-box empty" id="attempt-1"></div>
            <div class="attempt-box empty" id="attempt-2"></div>
            <div class="attempt-box empty" id="attempt-3"></div>
            <div class="attempt-box empty" id="attempt-4"></div>
            <div class="attempt-box empty" id="attempt-5"></div>
        </div>

        <!-- Controlli audio -->
        <div class="player-controls">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress"></div>
                <div class="time-marker" style="left: 6.25%;"></div>
                <div class="time-marker" style="left: 12.5%;"></div>
                <div class="time-marker" style="left: 25%;"></div>
                <div class="time-marker" style="left: 43.75%;"></div>
                <div class="time-marker" style="left: 68.75%;"></div>
            </div>
            
            <div class="time-info">
                <span id="current-time">0:00</span> / <span id="max-time">0:01</span>s
            </div>

            <button class="play-btn" id="play-btn" onclick="togglePlay()">
                <!-- Icona Play di default -->
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Icona Pause -->
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>

        <!-- Area di risposta -->
        <div class="input-section" id="input-section">
            <div class="search-container">
                <input type="text" id="guess-input" placeholder="Cerca canzone o artista..." autocomplete="off" oninput="showSuggestions(this.value)">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <div class="buttons-row">
                <button class="action-btn skip-btn" onclick="skipTurn()">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    SALTA
                </button>
                <button class="action-btn submit-btn" onclick="submitGuess()">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                    INVIA
                </button>
            </div>
        </div>
    </div>

    <!-- Div per player YouTube -->
    <div id="yt-player"></div>

    <!-- Modale Fine Gioco -->
    <div class="modal" id="end-modal">
        <div class="modal-content">
            <h2 id="modal-title">Risultato</h2>
            <p id="modal-text"></p>
            <p id="modal-song-info" style="font-weight: 700; color: var(--accent-color); margin-bottom: 24px; font-size: 18px;"></p>
            <button class="restart-btn" onclick="initGame()">Gioca ancora</button>
        </div>
    </div>

    <!-- Modale Impostazioni API -->
    <div class="modal" id="settings-modal" style="display:none;">
        <div class="modal-content">
            <h2>Impostazioni</h2>
            <p>Per cercare automaticamente le canzoni su YouTube senza limiti, inserisci la tua API Key di Google Cloud (YouTube Data API v3):</p>
            <input type="text" id="api-key-input" placeholder="Incolla qui la tua API Key..." style="margin-bottom: 20px;">
            <button class="restart-btn" onclick="saveSettings()" style="margin-bottom: 10px;">Salva</button>
            <button class="restart-btn skip-btn" onclick="toggleSettings()">Chiudi</button>
        </div>
    </div>

        async function initGame() {
            document.getElementById('end-modal').style.display = 'none';
            document.getElementById('guess-input').value = '';
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-status').innerText = 'Scelta della canzone segreta...';
            
            isPlaying = false;
            currentAttempt = 0;
            updateTimeInfo();

            for (let i = 0; i < 6; i++) {
                const box = document.getElementById(`attempt-${i}`);
                box.className = "attempt-box empty";
                box.innerHTML = "";
            }

            activeSong = playlist[Math.floor(Math.random() * playlist.length)];
            
            document.getElementById('loader-status').innerText = 'Ricerca del video su YouTube...';
            const ytId = await findYouTubeVideo(activeSong.title, activeSong.artist);

            if (!ytId) {
                document.getElementById('loader-status').innerText = 'Errore nel caricamento del video. Riprovo...';
                initGame();
                return;
            }

            activeSong.ytId = ytId;

            if (player) {
                player.loadVideoById(activeSong.ytId, 0);
                player.pauseVideo();
                document.getElementById('loader').style.display = 'none';
            } else {
                player = new YT.Player('yt-player', {
                    videoId: activeSong.ytId,
                    playerVars: {
                        'playsinline': 1,
                        'controls': 0,
                        'disablekb': 1,
                        'fs': 0,
                        'modestbranding': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': () => {
                            player.mute();
                            player.playVideo();
                            setTimeout(() => {
                                player.pauseVideo();
                                player.unMute();
                                player.seekTo(0);
                                document.getElementById('loader').style.display = 'none';
                            }, 1500);
                        }
                    }
                });
            }
        }

        // Funzione ottimizzata per cercare su YouTube con fallback robusti
        async function findYouTubeVideo(title, artist) {
            const query = `${title} ${artist} official audio`;
            
            if (apiKey) {
                try {
                    const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=1&key=${apiKey}`);
                    const data = await response.json();
                    if (data.items && data.items.length > 0) {
                        return data.items[0].id.videoId;
                    }
                } catch (e) {
                    console.error("Errore con l'API Key di YouTube:", e);
                }
            }
            
            // Lista di istanze pubbliche Invidious attive e aggiornate per cercare video senza chiave API
            const invidiousInstances = [
                'https://invidious.flokinet.to',
                'https://invidious.snopyta.org',
                'https://yewtu.be',
                'https://vid.puffyan.us',
                'https://invidious.kavin.rocks'
            ];

            for (const instance of invidiousInstances) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000); // 4 sec timeout per istanza
                    
                    const response = await fetch(`${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video`, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    const data = await response.json();
                    if (data && data.length > 0 && data[0].videoId) {
                        return data[0].videoId;
                    }
                } catch (e) {
                    console.warn(`Fallita ricerca su istanza ${instance}, provo la successiva...`);
                }
            }

            // Metodo di backup alternativo
            try {
                const response = await fetch(`https://open.tube/api/v1/search/videos?search=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    const url = data.data[0].url;
                    const match = url.match(/watch\?v=([^&]+)/) || url.match(/embed\/([^&]+)/);
                    if (match) return match[1];
                }
            } catch (e) {
                console.error("Errore con la ricerca di backup:", e);
            }

            // Se fallisce tutto, restituiamo un video musicale alternativo non vuoto
            return "dQw4w9WgXcQ"; // Rickroll di fallback
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            if (isPlaying) { pauseAudio(); } else { playAudio(); }
        }

        function playAudio() {
            player.seekTo(0);
            player.playVideo();
            isPlaying = true;
            document.getElementById('play-icon').style.display = "none";
            document.getElementById('pause-icon').style.display = "block";

            const limit = timeLimits[currentAttempt];
            
            progressInterval = setInterval(() => {
                const currentTime = player.getCurrentTime();
                const progressPercent = (currentTime / maxGameSeconds) * 100;
                
                document.getElementById('progress').style.width = `${progressPercent}%`;
                document.getElementById('current-time').innerText = formatTime(currentTime);

                if (currentTime >= limit) {
                    pauseAudio();
                    player.seekTo(0);
                }
            }, 50);
        }

        function pauseAudio() {
            clearInterval(progressInterval);
            if (player) player.pauseVideo();
            isPlaying = false;
            document.getElementById('play-icon').style.display = "block";
            document.getElementById('pause-icon').style.display = "none";
            document.getElementById('progress').style.width = "0%";
            document.getElementById('current-time').innerText = "0:00";
        }

        function formatTime(seconds) {
            const s = Math.floor(seconds);
            return `0:${s < 10 ? '0' : ''}${s}`;
        }

        function updateTimeInfo() {
            document.getElementById('max-time').innerText = timeLimits[currentAttempt];
        }

        // Gestione suggerimenti autocomplete
        function showSuggestions(val) {
            const suggestionsContainer = document.getElementById('suggestions');
            suggestionsContainer.innerHTML = '';
            
            if (!val || val.length < 2) {
                suggestionsContainer.style.display = 'none';
                return;
            }

            const cleanVal = val.toLowerCase();
            const filtered = playlist.filter(s => 
                s.title.toLowerCase().includes(cleanVal) || 
                s.artist.toLowerCase().includes(cleanVal)
            ).slice(0, 5);

            if (filtered.length === 0) {
                suggestionsContainer.style.display = 'none';
                return;
            }

            filtered.forEach(song => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = `${song.artist} - ${song.title}`;
                div.onclick = () => {
                    document.getElementById('guess-input').value = `${song.artist} - ${song.title}`;
                    suggestionsContainer.style.display = 'none';
                };
                suggestionsContainer.appendChild(div);
            });

            suggestionsContainer.style.display = 'block';
        }

        function submitGuess() {
            const input = document.getElementById('guess-input');
            const guess = input.value.trim();
            if (!guess) return;

            const box = document.getElementById(`attempt-${currentAttempt}`);
            const correctStr = `${activeSong.artist} - ${activeSong.title}`;

            if (guess.toLowerCase() === correctStr.toLowerCase()) {
                box.className = "attempt-box correct";
                box.innerHTML = `${checkSvg} ${correctStr}`;
                endGame(true);
            } else {
                box.className = "attempt-box incorrect";
                box.innerHTML = `${crossSvg} ${guess}`;
                nextAttempt();
            }
            input.value = '';
            document.getElementById('suggestions').style.display = 'none';
        }

        function skipTurn() {
            const box = document.getElementById(`attempt-${currentAttempt}`);
            box.className = "attempt-box incorrect";
            box.innerHTML = `${flagSvg} Saltato`;
            nextAttempt();
            document.getElementById('guess-input').value = '';
            document.getElementById('suggestions').style.display = 'none';
        }

        function nextAttempt() {
            pauseAudio();
            if (currentAttempt < 5) {
                currentAttempt++;
                updateTimeInfo();
            } else {
                endGame(false);
            }
        }

        function endGame(won) {
            pauseAudio();
            const modal = document.getElementById('end-modal');
            const title = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            const info = document.getElementById('modal-song-info');

            title.innerText = won ? "Hai vinto!" : "Game Over";
            text.innerText = won ? "Ottimo orecchio! Canzone indovinata:" : "La canzone era:";
            info.innerText = `${activeSong.artist} - ${activeSong.title}`;

            modal.style.display = "flex";
        }

        // Impostazioni
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
        }

        function saveSettings() {
            const val = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('yt_api_key', val);
            apiKey = val;
            toggleSettings();
            initGame();
        }
    </script>
</body>
</html>
